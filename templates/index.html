<<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { width: 680px; height: 85vh; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px 24px; border-bottom: 1px solid #eee; font-size: 18px; font-weight: 600; color: #111; }
        #chatbox { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
        .user { background: #111; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #f0f0f0; color: #111; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-row { padding: 16px 24px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; }
        input:focus { border-color: #111; }
        button { padding: 12px 20px; background: #111; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; }
        button:hover { background: #333; }
        .typing { color: #999; font-size: 14px; align-self: flex-start; padding: 8px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">AI Chat</div>
        <div id="chatbox"></div>
        <div class="input-row">
            <input type="text" id="userInput" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const chatbox = document.getElementById("chatbox");
            const message = input.value.trim();
            if (!message) return;

            chatbox.innerHTML += `<div class="message user">${message}</div>`;
            input.value = "";

            const typing = document.createElement("div");
            typing.className = "typing";
            typing.textContent = "AI is typing...";
            chatbox.appendChild(typing);
            chatbox.scrollTop = chatbox.scrollHeight;

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            chatbox.removeChild(typing);
            chatbox.innerHTML += `<div class="message ai">${data.reply}</div>`;
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
